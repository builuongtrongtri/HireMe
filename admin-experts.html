<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HireMe | Admin Experts</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body data-page="admin-experts">
  <header id="main-header">
    <div class="container header-content">
      <div class="logo"><img src="logo.png" alt="HireMe Logo"></div>
      <ul class="nav-links">
        <li id="nav-admin" class="active" onclick="navigate('admin')">Admin Console</li>
      </ul>
      <div style="display:flex;gap:15px;align-items:center;">
        <div id="auth-buttons"><button class="btn btn-outline" style="padding:0.6rem 1.2rem;" onclick="openModal('auth-modal')">Dang nhap / Dang ky</button></div>
        <div id="user-profile" onclick="logout()"><div class="avatar-sm"><i class="fa-solid fa-user"></i></div><span id="display-username">Hi, Guest</span></div>
      </div>
    </div>
  </header>

  <main class="page-padding container admin-console" id="admin-page">
    <section class="admin-hero">
      <div>
        <h1>Quan ly experts</h1>
        <p>Tao moi, cap nhat va xoa ho so chuyen gia.</p>
      </div>
      <div class="admin-chip"><i class="fa-solid fa-shield-halved"></i> Admin only</div>
    </section>

    <section class="admin-panel card">
      <div class="admin-grid-form" style="grid-template-columns:repeat(4, minmax(140px, 1fr));margin-bottom:0;">
        <button type="button" class="btn btn-outline" data-admin-nav="admin-users" onclick="navigate('admin-users')">Users</button>
        <button type="button" class="btn btn-outline" data-admin-nav="admin-experts" onclick="navigate('admin-experts')">Experts</button>
        <button type="button" class="btn btn-outline" data-admin-nav="admin-bookings" onclick="navigate('admin-bookings')">Bookings</button>
        <button type="button" class="btn btn-outline" data-admin-nav="admin-checklogs" onclick="navigate('admin-checklogs')">Checklog</button>
      </div>
    </section>

    <section class="admin-panel card">
      <div class="admin-panel-head">
        <h2>Thong tin expert</h2>
      </div>
      <form id="expert-form" class="admin-grid-form" onsubmit="submitExpertForm(event)">
        <input type="hidden" id="expert-id">
        <input id="expert-email" class="form-control" type="email" placeholder="Email expert (bat buoc khi tao moi)">
        <input id="expert-name" class="form-control" type="text" placeholder="Ho ten expert" required>
        <input id="expert-title" class="form-control" type="text" placeholder="Chuc danh" required>
        <input id="expert-years" class="form-control" type="number" min="0" value="0" placeholder="Nam kinh nghiem">
        <input id="expert-price" class="form-control" type="number" min="0" placeholder="Gia VND" required>
        <label class="admin-checkline"><input id="expert-available" type="checkbox" checked><span>Co the nhan lich</span></label>
        <label class="admin-checkline"><input id="expert-user-active" type="checkbox" checked><span>User dang active</span></label>
        <div class="admin-form-actions">
          <button type="submit" class="btn btn-primary">Luu expert</button>
          <button type="button" class="btn btn-outline" onclick="resetExpertForm()">Tao moi</button>
        </div>
      </form>
      <div style="display:none;">
        <select id="booking-edit-expert"><option value="">Chua phan cong</option></select>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Ho ten</th>
              <th>Email</th>
              <th>Chuc danh</th>
              <th>Gia</th>
              <th>Availability</th>
              <th>Thao tac</th>
            </tr>
          </thead>
          <tbody id="admin-experts-tbody">
            <tr><td colspan="6" class="admin-empty">Dang tai du lieu...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="auth-modal"><div class="modal"><span class="close-btn" onclick="closeModal('auth-modal')"><i class="fa-solid fa-xmark"></i></span><div class="auth-tabs"><div class="auth-tab active" id="tab-login" onclick="switchAuthMode('login')">Dang nhap</div><div class="auth-tab" id="tab-register" onclick="switchAuthMode('register')">Dang ky</div></div><form onsubmit="handleAuth(event)"><div class="form-group" id="group-name" style="display:none;"><label>Ho va ten</label><input type="text" id="auth-name" class="form-control"></div><div class="form-group"><label>Email</label><input type="email" id="auth-email" class="form-control" required></div><div class="form-group"><label>Mat khau</label><input type="password" id="auth-password" class="form-control" required></div><button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width:100%;">Xac thuc</button></form></div></div>

  <script src="scripts/app.js"></script>
</body>
</html>
